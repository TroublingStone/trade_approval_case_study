[tool.uv.workspace]
members = ["packages/*"]

[dependency-groups]
dev = [
    "pytest>=8.3",
    "pytest-asyncio>=0.24",
    "pytest-cov>=6.0",
    "httpx>=0.27",
    "ruff>=0.7",
    "mypy>=1.13",
    "pre-commit>=4.0",
]

[tool.pytest.ini_options]
testpaths = ["packages/core/tests", "packages/api/tests"]
addopts = "-ra --import-mode=importlib --cov=trade_approval_core --cov=trade_approval_api --cov-report=term-missing"
asyncio_mode = "auto"

[tool.ruff]
line-length = 120
target-version = "py312"

[tool.ruff.lint]
select = ["E", "W", "F", "I", "UP", "B", "N"]

[tool.mypy]
python_version = "3.12"
strict = true
